version = 1

[gpu]
assignment = "pinned"
parallel = 2

[owner_control]
bind = "127.0.0.1:7447"
advertise_addr = "203.0.113.10:7447"

[mesh_requirements]
require_release_attestation = true
release_signer_keys = [
  "ed25519:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef",
]

[defaults.model_fit]
ctx_size = 8192
batch = 512
ubatch = 256
keep_tokens = 256
prompt_cache = true
cache_idle_slots = 2

[defaults.model_fit.prefix_cache]
enabled = true
max_entries = 8
min_tokens = 96
shared_stride_tokens = 48
shared_record_limit = 2
payload_mode = "resident-kv"

[defaults.hardware]
device = "CUDA0"
hf_repo = "meshllm/example-gguf"
hf_file = "model.gguf"
stage_layer_start = 8
stage_layer_end = 24
mmproj = "defaults-projector.gguf"
mmproj_offload = "auto"

[defaults.skippy]
prefill_chunking = "schedule"
prefill_chunk_schedule = "128,256"

[defaults.speculative]
mode = "ngram"
ngram_min = 2
ngram_max = 4

[defaults.request_defaults]
mirostat_mode = 2
mirostat_entropy = 5.0
mirostat_learning_rate = 0.1

[defaults.multimodal]
mmproj = "defaults-projector.gguf"
mmproj_offload = "auto"
image_min_tokens = 128
image_max_tokens = 512

[[models]]
model = "Qwen/Qwen3-0.6B:Q4_K_M"

[models.model_fit]
ctx_size = 16384
batch = 1024
ubatch = 512
keep_tokens = 1024
prompt_cache = true
cache_idle_slots = 4

[models.model_fit.prefix_cache]
enabled = true
max_entries = 16
min_tokens = 128
shared_stride_tokens = 64
shared_record_limit = 4

[models.hardware]
device = "CUDA1"
hf_repo = "meshllm/model-gguf"
hf_file = "qwen.gguf"
stage_layer_start = 16
stage_layer_end = 32
mmproj = "model-projector.gguf"
mmproj_offload = "auto"

[models.skippy]
prefill_chunking = "fixed"
prefill_chunk_size = 256

[models.speculative]
mode = "draft"
draft_hf_repo = "meshllm/draft"
draft_hf_file = "draft.gguf"
draft_selection_policy = "manual"
draft_min_tokens = 4
draft_max_tokens = 8

[models.request_defaults]
mirostat_mode = "disabled"

[models.multimodal]
mmproj = "model-projector.gguf"
mmproj_offload = "auto"
