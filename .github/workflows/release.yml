name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version/tag to build, for example v0.31.0
        required: true
        type: string
      skip_gpu_bundles:
        description: Skip CUDA, CUDA Blackwell, ROCm, and Vulkan release bundles
        required: true
        default: false
        type: boolean
      canary:
        description: Dry-run mode — build + smoke everything but skip actual publishing
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CACHE_NAMESPACE: mesh-llm
  SCCACHE_GHA_ENABLED: "true"

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      skip_gpu_bundles: ${{ steps.meta.outputs.skip_gpu_bundles }}
      canary: ${{ steps.meta.outputs.canary }}
    steps:
      - id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SKIP_GPU_BUNDLES: ${{ inputs.skip_gpu_bundles || 'false' }}
          INPUT_CANARY: ${{ inputs.canary || 'false' }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_VERSION}"
          fi
          tag="v${tag#v}"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $tag" >&2
            exit 1
          fi
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "prerelease=$prerelease"
            echo "skip_gpu_bundles=$INPUT_SKIP_GPU_BUNDLES"
            echo "canary=$INPUT_CANARY"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64 Metal
            os: blacksmith-6vcpu-macos-15
            artifact_name: release-macos
            build_recipe: release-build
            bundle_recipe: release-bundle
            backend: metal
          - name: Linux x86_64 CPU
            os: blacksmith-4vcpu-ubuntu-2404
            artifact_name: release-linux
            build_recipe: release-build
            bundle_recipe: release-bundle
            backend: cpu
    env:
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Build release bundle
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          printf '%s' "$RELEASE_ATTESTATION_SIGNING_KEY" > "$MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE"
          printf '%s' "$RELEASE_ATTESTATION_PUBLIC_KEY" > "$MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE"
          just --shell bash --shell-arg -c ${{ matrix.build_recipe }}
          just --shell bash --shell-arg -c ${{ matrix.bundle_recipe }} "$RELEASE_TAG" dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload Linux smoke binary
        if: matrix.artifact_name == 'release-linux'
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          tar -xzf dist/mesh-llm-x86_64-unknown-linux-gnu.tar.gz -C "$tmp_dir"
          cp "$tmp_dir/mesh-bundle/mesh-llm" dist/mesh-llm

      - name: Upload Linux smoke binary artifact
        if: matrix.artifact_name == 'release-linux'
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-inference-binary
          path: dist/mesh-llm
          if-no-files-found: error

  inference_smoke_tests:
    needs: [metadata, build]
    if: needs.build.result == 'success'
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: release-linux-inference-binary
      mesh_binary_target: target/release/mesh-llm
      cache_key_prefix: release-

  build_native_sdk_runtime:
    name: Build native SDK runtime ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64 Metal
            os: blacksmith-6vcpu-macos-15
            backend: metal
            target: aarch64-apple-darwin
            artifact_suffix: darwin-aarch64-metal
          - name: Linux x86_64 CPU
            os: blacksmith-4vcpu-ubuntu-2404
            backend: cpu
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64-cpu
    env:
      LLAMA_STAGE_BACKEND: ${{ matrix.backend }}
      MESH_NATIVE_SDK_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Package native SDK runtime
        run: |
          scripts/package-native-sdk.sh \
            --build \
            --backend "${{ matrix.backend }}" \
            --target "${{ matrix.target }}" \
            --out dist/native-sdk

      - name: Verify native SDK runtime artifact
        run: scripts/verify-native-sdk-package.sh dist/native-sdk/*.tar.gz

      - name: Package native SDK runtime crate
        run: scripts/package-native-sdk-crate.sh --out dist/native-sdk-crates dist/native-sdk/*.tar.gz

      - name: Upload native SDK runtime
        uses: actions/upload-artifact@v6
        with:
          name: release-native-sdk-${{ matrix.artifact_suffix }}
          path: |
            dist/native-sdk/*.tar.gz
            dist/native-sdk/*.sha256
            dist/native-sdk-crates/*/target/package/*.crate
          if-no-files-found: error

  build_swift_sdk_artifact:
    name: Build Swift SDK XCFramework
    needs: metadata
    runs-on: blacksmith-6vcpu-macos-15
    env:
      LLAMA_STAGE_BACKEND: metal
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install macOS dependencies
        run: brew install cmake ninja lld

      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"

      - name: Build SwiftPM binary artifact
        run: |
          sdk/swift/scripts/build-xcframework.sh
          mkdir -p dist
          rm -f dist/MeshLLMFFI.xcframework.zip
          ditto -c -k --sequesterRsrc --keepParent \
            sdk/swift/Generated/MeshLLMFFI.xcframework \
            dist/MeshLLMFFI.xcframework.zip

      - name: Prepare SwiftPM manifest for dispatched release
        if: github.event_name == 'workflow_dispatch'
        run: |
          scripts/update-swift-package-manifest.sh \
            "${{ needs.metadata.outputs.tag }}" \
            dist/MeshLLMFFI.xcframework.zip

      - name: Verify SwiftPM binary artifact
        run: |
          scripts/verify-swift-release-artifact.sh dist/MeshLLMFFI.xcframework.zip
          scripts/verify-swift-package-manifest.sh \
            "${{ needs.metadata.outputs.tag }}" \
            dist/MeshLLMFFI.xcframework.zip

      - name: Upload generated SwiftPM manifest
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: swift-package-manifest
          path: Package.swift
          if-no-files-found: error

      - name: Upload SwiftPM binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-swift-sdk
          path: dist/MeshLLMFFI.xcframework.zip
          if-no-files-found: error

  build_linux_arm64:
    name: Build Linux ARM64 CPU
    needs: metadata
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    env:
      LLAMA_STAGE_BACKEND: cpu
      MESH_RELEASE_ARCH: aarch64
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl lld
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Build ARM64 CPU release bundle
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          printf '%s' "$RELEASE_ATTESTATION_SIGNING_KEY" > "$MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE"
          printf '%s' "$RELEASE_ATTESTATION_PUBLIC_KEY" > "$MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE"
          just --shell bash --shell-arg -c release-build-aarch64
          just --shell bash --shell-arg -c release-bundle-aarch64 "$RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: release-linux-arm64
          path: dist/*
          if-no-files-found: error

  build_linux_aarch64_cuda:
    name: Build Linux aarch64 CUDA (${{ matrix.cuda_version }})
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ['12.9.2', '13.1.2']
    container:
      image: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu24.04
    env:
      LLAMA_STAGE_BACKEND: cuda
      MESH_RELEASE_ARCH: aarch64
      MESH_CUDA_VERSION: ${{ matrix.cuda_version }}
    steps:
      - name: Install base packages
        run: |
          for attempt in 1 2 3; do
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - name: Build aarch64 CUDA release bundle
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          just --shell bash --shell-arg -c release-build-aarch64-cuda
          just --shell bash --shell-arg -c release-bundle-aarch64-cuda "$RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: release-linux-aarch64-cuda-${{ matrix.cuda_version }}
          path: dist/*
          if-no-files-found: error

  build_linux_cuda:
    name: Build Linux CUDA (${{ matrix.cuda_version }})
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ['12.9.2', '13.1.2']
    container:
      image: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu24.04
    env:
      LLAMA_STAGE_BACKEND: cuda
      MESH_CUDA_VERSION: ${{ matrix.cuda_version }}
    steps:
      - name: Install base packages
        run: |
          for attempt in 1 2 3; do
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Build CUDA release bundle
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          printf '%s' "$RELEASE_ATTESTATION_SIGNING_KEY" > "$MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE"
          printf '%s' "$RELEASE_ATTESTATION_PUBLIC_KEY" > "$MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE"
          just --shell bash --shell-arg -c release-build-cuda
          just --shell bash --shell-arg -c release-bundle-cuda "$RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: release-linux-cuda-${{ matrix.cuda_version }}
          path: dist/*
          if-no-files-found: error



  build_linux_rocm:
    name: Build Linux ROCm
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete
    env:
      LLAMA_STAGE_BACKEND: rocm
    steps:
      - name: Install base packages
        run: |
          for attempt in 1 2 3; do
            apt-get -o Acquire::Retries=5 update &&
              DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retries=5 install -y --fix-missing ca-certificates curl git cmake ninja-build pkg-config libssl-dev libdbus-1-dev python3 build-essential lld &&
              break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          rm -rf /var/lib/apt/lists/*
      - uses: actions/checkout@v5
      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Build ROCm release bundle
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          printf '%s' "$RELEASE_ATTESTATION_SIGNING_KEY" > "$MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE"
          printf '%s' "$RELEASE_ATTESTATION_PUBLIC_KEY" > "$MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE"
          just --shell bash --shell-arg -c release-build-rocm
          just --shell bash --shell-arg -c release-bundle-rocm "$RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: release-linux-rocm
          path: dist/*
          if-no-files-found: error

  build_linux_vulkan:
    name: Build Linux Vulkan
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      LLAMA_STAGE_BACKEND: vulkan
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libdbus-1-dev curl glslc libvulkan-dev spirv-headers lld
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Build Vulkan release bundle
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          printf '%s' "$RELEASE_ATTESTATION_SIGNING_KEY" > "$MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE"
          printf '%s' "$RELEASE_ATTESTATION_PUBLIC_KEY" > "$MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE"
          just --shell bash --shell-arg -c release-build-vulkan
          just --shell bash --shell-arg -c release-bundle-vulkan "$RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: release-linux-vulkan
          path: dist/*
          if-no-files-found: error

  build_windows_cpu:
    name: Build Windows CPU
    needs: metadata
    runs-on: blacksmith-8vcpu-windows-2025
    env:
      LLAMA_STAGE_BACKEND: cpu
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Build Windows CPU release bundle
        shell: pwsh
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          MESH_LLM_REQUIRE_SCCACHE: "1"
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          Set-Content -Path $env:MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE -Value $env:RELEASE_ATTESTATION_SIGNING_KEY -NoNewline
          Set-Content -Path $env:MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE -Value $env:RELEASE_ATTESTATION_PUBLIC_KEY -NoNewline
          just release-build-windows
          just release-bundle-windows "$env:RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: dist/*
          if-no-files-found: error

  build_windows_gpu:
    name: Build Windows ${{ matrix.name }}
    needs: metadata
    if: ${{ needs.metadata.outputs.skip_gpu_bundles != 'true' }}
    runs-on: blacksmith-8vcpu-windows-2025
    env:
      ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe
      # Pin Windows CUDA to a version sccache 0.15.0 supports.
      # `choco install cuda` (used previously via install-windows-sdk.ps1)
      # pulls latest = CUDA 13.2, which deterministically crashes sccache
      # on nvcc output (see mozilla/sccache#2470). CI pins to the same
      # version via Jimver/cuda-toolkit; mirror that here.
      WINDOWS_CUDA_VERSION: ${{ vars.CUDA_VERSION || '12.9.2' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CUDA
            backend: cuda
            build_recipe: release-build-cuda-windows
            bundle_recipe: release-bundle-cuda-windows
            artifact_name: release-windows-cuda
          - name: ROCm
            backend: rocm
            build_recipe: release-build-rocm-windows
            bundle_recipe: release-bundle-rocm-windows
            artifact_name: release-windows-rocm
          - name: Vulkan
            backend: vulkan
            build_recipe: release-build-vulkan-windows
            bundle_recipe: release-bundle-vulkan-windows
            artifact_name: release-windows-vulkan
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            .github/cache-version.txt
            crates/mesh-llm-ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Cache Windows SDK installers
        if: ${{ matrix.backend != 'cuda' }}
        uses: actions/cache@v5
        with:
          path: ~/sdk-installer-cache/${{ matrix.backend }}
          key: windows-sdk-installers-${{ matrix.backend }}-${{ env.ROCM_HIP_SDK_FILENAME }}-${{ hashFiles('scripts/install-windows-sdk.ps1') }}
      - name: Install CUDA toolkit
        if: ${{ matrix.backend == 'cuda' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.WINDOWS_CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'
          use-github-cache: true
          use-local-cache: true
          log-file-suffix: windows-cuda-release
      - name: Verify CUDA toolkit
        if: ${{ matrix.backend == 'cuda' }}
        shell: pwsh
        run: |
          if (-not $env:CUDA_PATH -or -not (Test-Path $env:CUDA_PATH)) {
            throw "CUDA_PATH was not configured by Jimver/cuda-toolkit."
          }
          & nvcc --version
      - name: Install backend SDK
        if: ${{ matrix.backend != 'cuda' }}
        shell: pwsh
        run: |
          .\scripts\install-windows-sdk.ps1 `
            -Backend "${{ matrix.backend }}" `
            -RocmHipSdkFilename "$env:ROCM_HIP_SDK_FILENAME" `
            -InstallerCacheDir "$HOME\sdk-installer-cache"
      - name: Build Windows GPU release bundle
        shell: pwsh
        env:
          MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-private-key.json
          MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE: ${{ runner.temp }}/mesh-release-attestation-public-key.json
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          MESH_LLM_REQUIRE_SCCACHE: "1"
          MESH_LLM_WINDOWS_BUILD_JOBS: ${{ matrix.backend == 'cuda' && '1' || '' }}
          RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE }}
          RELEASE_ATTESTATION_PUBLIC_KEY: ${{ secrets.MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE }}
        run: |
          Set-Content -Path $env:MESH_RELEASE_ATTESTATION_SIGNING_KEY_FILE -Value $env:RELEASE_ATTESTATION_SIGNING_KEY -NoNewline
          Set-Content -Path $env:MESH_RELEASE_ATTESTATION_PUBLIC_KEY_FILE -Value $env:RELEASE_ATTESTATION_PUBLIC_KEY -NoNewline
          just ${{ matrix.build_recipe }}
          just ${{ matrix.bundle_recipe }} "$env:RELEASE_TAG" dist
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - metadata
      - build
      - inference_smoke_tests
      - build_native_sdk_runtime
      - build_swift_sdk_artifact
      - build_linux_arm64
      - build_linux_aarch64_cuda
      - build_linux_cuda
      - build_linux_rocm
      - build_linux_vulkan
      - build_windows_cpu
      - build_windows_gpu
    if: ${{ always() && needs.metadata.result == 'success' && needs.metadata.outputs.canary != 'true' && needs.build.result == 'success' && needs.inference_smoke_tests.result == 'success' && needs.build_native_sdk_runtime.result == 'success' && needs.build_swift_sdk_artifact.result == 'success' && needs.build_linux_arm64.result == 'success' && (needs.build_linux_aarch64_cuda.result == 'success' || needs.build_linux_aarch64_cuda.result == 'skipped') && (needs.build_linux_cuda.result == 'success' || needs.build_linux_cuda.result == 'skipped') && (needs.build_linux_rocm.result == 'success' || needs.build_linux_rocm.result == 'skipped') && (needs.build_linux_vulkan.result == 'success' || needs.build_linux_vulkan.result == 'skipped') && needs.build_windows_cpu.result == 'success' && (needs.build_windows_gpu.result == 'success' || needs.build_windows_gpu.result == 'skipped') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        if: github.event_name == 'workflow_dispatch'

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Remove smoke-only binary
        run: rm -f release-artifacts/mesh-llm

      - name: Download generated SwiftPM manifest
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v7
        with:
          name: swift-package-manifest
          path: generated-swift-manifest

      - name: Create dispatched release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $RELEASE_TAG; reusing it"
            exit 0
          fi
          scripts/release-version.sh "$RELEASE_TAG"
          cp generated-swift-manifest/Package.swift Package.swift
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml tools/*/Cargo.toml sdk/kotlin/build.gradle.kts Package.swift
          if git diff --cached --quiet; then
            echo "Release source files already match $RELEASE_TAG"
          else
            git commit -m "$RELEASE_TAG: prepare release source"
          fi
          git tag "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          overwrite_files: true
          files: release-artifacts/*

  publish_crates_preflight:
    name: Preflight crates.io packages
    needs: [metadata, publish]
    if: ${{ needs.metadata.outputs.prerelease != 'true' && needs.metadata.outputs.canary != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Check crates.io publish-chain consistency
        run: cargo run -p xtask -- repo-consistency publish-crates
      - name: Dry-run crates.io package chain
        run: scripts/publish-crates.sh --dry-run --allow-dirty --sleep-seconds 0

  publish_crates:
    name: Publish crates.io packages
    needs: [metadata, publish, publish_crates_preflight]
    if: ${{ needs.metadata.outputs.prerelease != 'true' && needs.metadata.outputs.canary != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare dispatched release version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: scripts/release-version.sh "$RELEASE_TAG"
      - name: Publish crates.io package chain
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: scripts/publish-crates.sh
