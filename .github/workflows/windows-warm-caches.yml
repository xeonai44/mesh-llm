name: Warm Windows ABI CI caches

on:
  push:
    branches: [main]
    paths:
      - 'third_party/llama.cpp/upstream.txt'
      - 'third_party/llama.cpp/patches/**'
      - 'scripts/build-windows.ps1'
      - 'scripts/install-windows-sdk.ps1'
      - 'Justfile'
      - '.github/cache-version.txt'
      - '.github/actions/setup-windows-rocm-sdk/action.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/pr_builds.yml'
      - '.github/workflows/windows-warm-caches.yml'
  workflow_dispatch:
    inputs:
      retention:
        description: 'Number of warmed Windows ABI cache versions to keep'
        required: false
        default: ''

concurrency:
  group: windows-warm-caches-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  CACHE_NAMESPACE: mesh-llm
  LLAMA_WINDOWS_CACHE_RETENTION: ${{ github.event.inputs.retention || vars.LLAMA_WINDOWS_CACHE_RETENTION || '2' }}
  WINDOWS_CUDA_VERSION: ${{ vars.CUDA_VERSION || '12.6.3' }}
  WINDOWS_VULKAN_SDK_VERSION: ${{ vars.VULKAN_SDK_VERSION || '1.4.328.1' }}
  ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe

jobs:
  warm_windows_cpu:
    name: Warm Windows CPU ABI cache
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-2022
    env:
      LLAMA_STAGE_BACKEND: cpu
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-cpu
      MESH_LLM_SKIP_UI: "1"
      MESH_LLM_REQUIRE_SCCACHE: "1"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: windows-cpu
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Prepare UI placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path crates/mesh-llm-ui/dist | Out-Null
          '<html></html>' | Set-Content -Path crates/mesh-llm-ui/dist/index.html -Encoding utf8
      - name: Ensure ABI cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:LLAMA_STAGE_BUILD_DIR | Out-Null
      - name: Restore Windows CPU ABI cache
        id: llama_cache
        uses: actions/cache/restore@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-cpu
          key: ${{ env.CACHE_NAMESPACE }}-windows-2022-skippy-abi-cpu--cpu-${{ hashFiles('scripts/build-windows.ps1', 'scripts/install-windows-sdk.ps1', '.github/actions/setup-windows-rocm-sdk/action.yml', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Build Windows CPU ABI cache
        if: steps.llama_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: just release-build-windows
      - name: Verify Windows CPU ABI cache
        shell: pwsh
        run: |
          $libs = Get-ChildItem -Path $env:LLAMA_STAGE_BUILD_DIR -Recurse -File -Filter *.lib -ErrorAction SilentlyContinue | Select-Object -First 20
          if (-not $libs) {
            throw "No static libraries were found under $env:LLAMA_STAGE_BUILD_DIR."
          }
          $libs | ForEach-Object { Write-Host $_.FullName }
      - name: Save Windows CPU ABI cache
        if: steps.llama_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-cpu
          key: ${{ steps.llama_cache.outputs.cache-primary-key }}

  warm_windows_gpu:
    name: Warm Windows ${{ matrix.name }} ABI cache
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-2022
    env:
      LLAMA_STAGE_BUILD_DIR: .deps/llama.cpp/build-stage-abi-${{ matrix.backend }}
      MESH_LLM_SKIP_UI: "1"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CUDA
            backend: cuda
            build_recipe: release-build-cuda-windows
            build_args: "75"
          - name: ROCm
            backend: rocm
            build_recipe: release-build-rocm-windows
            build_args: "gfx1100"
          - name: Vulkan
            backend: vulkan
            build_recipe: release-build-vulkan-windows
            build_args: ""
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@just
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ runner.os }}-${{ hashFiles('.github/cache-version.txt') }}
          shared-key: windows-${{ matrix.backend }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Prepare UI placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path crates/mesh-llm-ui/dist | Out-Null
          '<html></html>' | Set-Content -Path crates/mesh-llm-ui/dist/index.html -Encoding utf8
      - name: Ensure ABI cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:LLAMA_STAGE_BUILD_DIR | Out-Null
      - name: Restore Windows GPU ABI cache
        id: llama_cache
        uses: actions/cache/restore@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-${{ matrix.backend }}
          key: ${{ env.CACHE_NAMESPACE }}-windows-2022-skippy-abi-${{ matrix.backend }}-${{ matrix.build_args }}-${{ matrix.backend == 'cuda' && format('cuda-{0}-Jimver-v0.2.35', env.WINDOWS_CUDA_VERSION) || matrix.backend == 'vulkan' && format('vulkan-{0}-jakoch-v1.5.2', env.WINDOWS_VULKAN_SDK_VERSION) || format('rocm-{0}', env.ROCM_HIP_SDK_FILENAME) }}-${{ hashFiles('scripts/build-windows.ps1', 'scripts/install-windows-sdk.ps1', '.github/actions/setup-windows-rocm-sdk/action.yml', 'third_party/llama.cpp/upstream.txt', 'third_party/llama.cpp/patches/**', 'Justfile', '.github/cache-version.txt') }}
      - name: Install CUDA toolkit
        if: ${{ matrix.backend == 'cuda' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.WINDOWS_CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'
          use-github-cache: true
          use-local-cache: true
          log-file-suffix: windows-cuda
      - name: Verify CUDA toolkit
        if: ${{ matrix.backend == 'cuda' && steps.llama_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          if (-not $env:CUDA_PATH -or -not (Test-Path $env:CUDA_PATH)) {
            throw "CUDA_PATH was not configured by Jimver/cuda-toolkit."
          }
          & nvcc --version
          foreach ($library in @("cuda.lib", "cudart.lib", "cublas.lib", "cublasLt.lib")) {
            $path = Join-Path $env:CUDA_PATH "lib\x64\$library"
            if (-not (Test-Path $path)) {
              throw "Expected CUDA import library was not found: $path"
            }
          }
      - name: Install Vulkan SDK
        if: ${{ matrix.backend == 'vulkan' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: jakoch/install-vulkan-sdk-action@v1.5.2
        with:
          vulkan_version: ${{ env.WINDOWS_VULKAN_SDK_VERSION }}
          cache: true
          stripdown: true
      - name: Verify Vulkan SDK
        if: ${{ matrix.backend == 'vulkan' && steps.llama_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          if (-not $env:VULKAN_SDK -or -not (Test-Path $env:VULKAN_SDK)) {
            throw "VULKAN_SDK was not configured by jakoch/install-vulkan-sdk-action."
          }
          $glslc = Join-Path $env:VULKAN_SDK "Bin\glslc.exe"
          if (-not (Test-Path $glslc)) {
            throw "glslc.exe was not found at $glslc"
          }
          & $glslc --version
          $vulkanLib = Join-Path $env:VULKAN_SDK "Lib\vulkan-1.lib"
          if (-not (Test-Path $vulkanLib)) {
            throw "Expected Vulkan import library was not found: $vulkanLib"
          }
      - name: Install ROCm HIP SDK
        if: ${{ matrix.backend == 'rocm' && steps.llama_cache.outputs.cache-hit != 'true' }}
        uses: ./.github/actions/setup-windows-rocm-sdk
        with:
          rocm-hip-sdk-filename: ${{ env.ROCM_HIP_SDK_FILENAME }}
      - name: Build Windows GPU ABI cache
        if: steps.llama_cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          MESH_LLM_REQUIRE_SCCACHE: "1"
        run: |
          if ("${{ matrix.build_args }}" -ne "") {
            just ${{ matrix.build_recipe }} "${{ matrix.build_args }}"
          } else {
            just ${{ matrix.build_recipe }}
          }
      - name: Verify Windows GPU ABI cache
        shell: pwsh
        run: |
          $libs = Get-ChildItem -Path $env:LLAMA_STAGE_BUILD_DIR -Recurse -File -Filter *.lib -ErrorAction SilentlyContinue | Select-Object -First 20
          if (-not $libs) {
            throw "No static libraries were found under $env:LLAMA_STAGE_BUILD_DIR."
          }
          $libs | ForEach-Object { Write-Host $_.FullName }
      - name: Save Windows GPU ABI cache
        if: steps.llama_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps/llama.cpp/build-stage-abi-${{ matrix.backend }}
          key: ${{ steps.llama_cache.outputs.cache-primary-key }}

  prune_windows_abi_caches:
    name: Prune old Windows ABI caches
    needs:
      - warm_windows_cpu
      - warm_windows_gpu
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Prune old Windows ABI caches
        uses: actions/github-script@v8
        env:
          CACHE_NAMESPACE: ${{ env.CACHE_NAMESPACE }}
          RETENTION: ${{ env.LLAMA_WINDOWS_CACHE_RETENTION }}
          TARGET_REF: ${{ github.ref }}
        with:
          script: |
            const retention = parseInt(process.env.RETENTION, 10);
            const ref = process.env.TARGET_REF;
            const prefixes = [
              `${process.env.CACHE_NAMESPACE}-windows-2022-skippy-abi-cpu-`,
              `${process.env.CACHE_NAMESPACE}-windows-2022-skippy-abi-cuda-`,
              `${process.env.CACHE_NAMESPACE}-windows-2022-skippy-abi-rocm-`,
              `${process.env.CACHE_NAMESPACE}-windows-2022-skippy-abi-vulkan-`,
            ];

            if (!Number.isFinite(retention) || retention < 1) {
              core.setFailed(`LLAMA_WINDOWS_CACHE_RETENTION must be positive, got: "${process.env.RETENTION}"`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allCaches = [];
            for (let page = 1; page <= 10; page++) {
              const { data } = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
                owner,
                repo,
                ref,
                per_page: 100,
                page,
                sort: 'created_at',
                direction: 'desc',
              });
              const pageCaches = data.actions_caches || [];
              allCaches.push(...pageCaches);
              if (pageCaches.length < 100) break;
            }

            for (const prefix of prefixes) {
              const matching = allCaches.filter((c) => c.key.startsWith(prefix));
              for (const cache of matching.slice(retention)) {
                await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
                  owner,
                  repo,
                  cache_id: cache.id,
                });
              }
              core.notice(`Pruned ${Math.max(matching.length - retention, 0)} cache(s) for ${prefix}`);
            }
