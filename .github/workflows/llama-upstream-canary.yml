name: llama.cpp Upstream Canary

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_sha:
        description: "Optional llama.cpp upstream SHA to validate instead of origin/master"
        required: false

permissions:
  contents: write

jobs:
  latest-upstream:
    runs-on: ubuntu-24.04
    env:
      LLAMA_UPSTREAM_CANARY_SMOKE: ${{ vars.LLAMA_UPSTREAM_CANARY_SMOKE || '1' }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential pkg-config libssl-dev libdbus-1-dev libcurl4-openssl-dev curl jq lsof

      - name: Prepare requested llama.cpp upstream
        env:
          UPSTREAM_SHA: ${{ github.event.inputs.upstream_sha || 'latest' }}
        run: scripts/prepare-llama.sh "$UPSTREAM_SHA"

      - name: Capture upstream SHAs
        id: sha
        run: |
          old_sha="$(tr -d '[:space:]' < third_party/llama.cpp/upstream.txt)"
          new_sha="$(tr -d '[:space:]' < .deps/llama.cpp/.mesh-llm-upstream-sha)"
          echo "old_sha=$old_sha" >> "$GITHUB_OUTPUT"
          echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
          if [[ "$old_sha" == "$new_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build patched llama.cpp ABI
        if: steps.sha.outputs.changed == 'true'
        run: scripts/build-llama.sh

      - name: Build stage runtime crates
        if: steps.sha.outputs.changed == 'true'
        run: cargo check -p skippy-ffi -p skippy-runtime -p skippy-server -p skippy-model-package -p skippy-correctness -p llama-spec-bench

      - name: Restore Skippy smoke model cache
        if: steps.sha.outputs.changed == 'true' && env.LLAMA_UPSTREAM_CANARY_SMOKE != '0' && env.LLAMA_UPSTREAM_CANARY_SMOKE != 'false'
        id: skippy_smoke_model_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/skippy-ci-smoke-models
          key: mesh-llm-${{ runner.os }}-skippy-ci-smoke-models-SmolLM2-135M-Instruct.Q4_K_M.gguf-Falcon-H1-0.5B-Instruct-Q4_K_M.gguf-${{ hashFiles('.github/cache-version.txt') }}
          restore-keys: |
            mesh-llm-${{ runner.os }}-skippy-ci-smoke-models-

      - name: Skippy smoke tests
        if: steps.sha.outputs.changed == 'true' && env.LLAMA_UPSTREAM_CANARY_SMOKE != '0' && env.LLAMA_UPSTREAM_CANARY_SMOKE != 'false'
        timeout-minutes: 45
        env:
          WORK_DIR: ${{ runner.temp }}/skippy-ci-smoke
          MODEL_DIR: ${{ runner.temp }}/skippy-ci-smoke-models
        run: scripts/skippy-ci-smoke.sh

      - name: Save Skippy smoke model cache
        if: steps.sha.outputs.changed == 'true' && env.LLAMA_UPSTREAM_CANARY_SMOKE != '0' && env.LLAMA_UPSTREAM_CANARY_SMOKE != 'false' && github.ref == 'refs/heads/main' && steps.skippy_smoke_model_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/skippy-ci-smoke-models
          key: ${{ steps.skippy_smoke_model_cache.outputs.cache-primary-key }}

      - name: Update llama.cpp upstream pin
        if: steps.sha.outputs.changed == 'true'
        run: scripts/update-llama-pin.sh

      - name: Generate summary
        if: steps.sha.outputs.changed == 'true'
        env:
          SKIPPY_CI_SMOKE: ${{ env.LLAMA_UPSTREAM_CANARY_SMOKE }}
        run: |
          scripts/summarize-llama-upstream.sh \
            "${{ steps.sha.outputs.old_sha }}" \
            "${{ steps.sha.outputs.new_sha }}" \
            .deps/llama.cpp \
            > /tmp/llama-upstream-pr.md

      - name: Commit upstream pin to main
        if: steps.sha.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add third_party/llama.cpp/upstream.txt
          if git diff --cached --quiet; then
            echo "No upstream pin changes to commit."
            exit 0
          fi
          git commit -m "Update llama.cpp upstream pin"
          git push origin HEAD:refs/heads/main

      - name: Report upstream pin update
        if: steps.sha.outputs.changed == 'true'
        run: |
          {
            echo "## llama.cpp upstream pin update"
            echo
            echo "Pushed the validated upstream pin to \`main\`."
            echo
            cat /tmp/llama-upstream-pr.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
